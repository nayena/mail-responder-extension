<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Reply Fast</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 240px;
      background: #0e0e0e;
      color: #e0ddd6;
      font-family: Georgia, serif;
    }
    body {
      padding: 18px 18px 16px;
      box-sizing: border-box;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #e0ddd6;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d4a843;
      display: inline-block;
    }
    .desc {
      margin: 14px 0 18px;
      font-style: italic;
      font-size: 12.5px;
      color: #e0ddd6;
      line-height: 1.45;
    }
    .cta {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      background: #d4a843;
      color: #0e0e0e;
      text-align: center;
      text-decoration: none;
      font-family: Georgia, serif;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-radius: 4px;
      transition: background 0.15s ease;
    }
    .cta:hover { background: #e0b85a; }
    .hint {
      margin-top: 12px;
      font-size: 11px;
      color: #555;
      text-align: center;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="header"><span class="dot"></span><span>Reply Fast</span></div>
  <p class="desc">AI email drafting + calendar availability, inside Gmail.</p>
  <a class="cta" href="https://mail.google.com" target="_blank">Open Gmail &rarr;</a>
  <p class="hint">Look for the &#10022; button in Gmail</p>
</body>
</html>
